
<!DOCTYPE html>
<html>
<head>
<title>Dailymotion Multiplier</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial, sans-serif;
background:#111;
color:white;
text-align:center;
margin:0;
padding:0;
}

header{
padding:20px;
font-size:28px;
font-weight:bold;
}

textarea{
width:85%;
height:120px;
margin:20px;
padding:10px;
font-size:14px;
}

button{
padding:12px 25px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:6px;
}

#grid{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(320px,1fr));
gap:12px;
padding:20px;
}

iframe{
width:100%;
height:240px;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<header>Dailymotion Multiplier</header>

<p>Paste multiple Dailymotion video links (one per line)</p>

<textarea id="links" placeholder="https://www.dailymotion.com/video/xxxxx"></textarea><br>

<button onclick="loadVideos()">Load Videos</button>

<div id="grid"></div>

<script>

function getVideoId(url){
let match = url.match(/video\/([a-zA-Z0-9]+)/);
if(match){
return match[1];
}
return null;
}

function loadVideos(){

let input = document.getElementById("links").value;
let urls = input.split("\n");
let grid = document.getElementById("grid");

grid.innerHTML = "";

urls.forEach(url => {

let id = getVideoId(url.trim());

if(id){

let iframe = document.createElement("iframe");

iframe.src = "https://www.dailymotion.com/embed/video/" + id + "?autoplay=1&mute=1";

grid.appendChild(iframe);

}

});

}

</script>

</body>
</html>
